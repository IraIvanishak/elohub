{% extends "base.html" %}
{% block title %}Register — SkillBoard{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 3rem auto;">
    <h2>Create Account</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required pattern="[a-zA-Z0-9_-]+" title="Letters, numbers, hyphens, underscores">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
    <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; text-align: center;">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>
{% endblock %}

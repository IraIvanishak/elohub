{% extends "base.html" %}
{% block title %}Login — SkillBoard{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 3rem auto;">
    <h2>Login</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; text-align: center;">
        New here? <a href="/register">Create account</a>
    </p>
    <p style="margin-top: 0.5rem; color: var(--text-muted); font-size: 0.8rem; text-align: center;">
        Demo accounts: maksym / anya / oleh (password: <code>password</code>)
    </p>
</div>
{% endblock %}

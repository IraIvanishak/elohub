{% extends "base.html" %}
{% block title %}Settings — SkillBoard{% endblock %}

{% block content %}
<div class="card">
    <h2>Settings</h2>
    <form method="POST" action="/settings">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Display Name</label>
            <input type="text" name="display_name" value="{{ current_user.display_name or '' }}" placeholder="{{ current_user.username }}">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ current_user.username }}" disabled>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" value="{{ current_user.email }}" disabled>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}
